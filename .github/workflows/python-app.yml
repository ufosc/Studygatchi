# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Pytest filter (e.g. -m smoke, -k auth)"
        default: "-m required"
        required: false

permissions:
  contents: read

env:
  REQUIRED_TESTS: ${{ github.event.inputs.test_filter || '-m required' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-django
    
    - name: Lint with ruff
      working-directory: ./backend
      run: |
        ruff check .
        ruff format --check .
    
    - name: Create test settings.py
      working-directory: ./backend
      run: |
        cp settings_template.txt settings.py
        sed -i "s/'ENGINE': 'django.db.backends.postgresql'/'ENGINE': 'django.db.backends.sqlite3'/g" settings.py
        sed -i "s/'NAME': 'your_database_name'/'NAME': ':memory:'/g" settings.py
    
    - name: Run migrations
      run: |
        python manage.py makemigrations
        python manage.py migrate
    
    - name: Test with pytest
      run: |
        pytest ${{ env.REQUIRED_TESTS }}

  build-addtl:
    runs-on: ubuntu-latest
    steps:
